<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>컴퓨터 부품 견적</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div id="container">
			<div id="main-content">
				<form id="searchForm">
					<input
						type="text"
						id="cmd"
						placeholder="검색어 입력 (예: 삼성)"
						required />
					<select id="category" required>
						<option value="주요구성">PC 주요구성</option>
						<option value="모니터">모니터</option>
						<option value="주변기기">주변기기</option>
						<option value="소프트웨어">소프트웨어</option>
						<option value="개인방송장비">개인방송장비</option>
					</select>
					<input
						type="text"
						id="detail"
						placeholder="세부 카테고리 입력 (예: cpu)" />
					<button type="submit">검색</button>
				</form>
				<div id="sort-buttons">
					<button
						class="sort-btn active"
						data-order="C.pd_suggest desc,C.pd_sold desc">
						인기상품순
					</button>
					<button class="sort-btn" data-order="pd_date desc">
						신상품순
					</button>
					<button class="sort-btn" data-order="C.pd_sobija_price asc">
						낮은 가격순
					</button>
					<button
						class="sort-btn"
						data-order="C.pd_sobija_price desc">
						높은 가격순
					</button>
				</div>
				<div id="result"></div>
			</div>
			<div id="cart">
				<h2>장바구니</h2>
				<div id="cart-categories"></div>
				<div id="cart-items">
					<p>장바구니가 비었습니다.</p>
				</div>
			</div>
		</div>

		<div id="specPopupOverlay" class="spec-popup-overlay">
			<div class="spec-popup-content">
				<button class="spec-popup-close-btn">&times;</button>
				<h3 id="popupProductName"></h3>
				<p id="popupProductSpec"></p>
			</div>
		</div>

		<script src="script.js"></script>
	</body>
</html>
